<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOEIC Vocab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .card-container { perspective: 1200px; }
    .card-inner {
      transition: transform 0.65s cubic-bezier(0.4,0.2,0.2,1);
      transform-style: preserve-3d;
      position: relative;
    }
    .card-inner.flipped { transform: rotateY(180deg); }
    .card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .card-back {
      transform: rotateY(180deg);
      position: absolute; top: 0; left: 0; right: 0;
    }
    .slide-in { animation: slideIn 0.35s ease; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(60px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    // ── CSV Parser ──────────────────────────────────────────────────────────
    function parseCSV(text) {
      text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      const rows = [];
      let i = 0;
      const len = text.length;

      while (i < len) {
        const fields = [];
        while (i < len) {
          let field = '';
          if (text[i] === '"') {
            i++; // skip opening quote
            while (i < len) {
              if (text[i] === '"') {
                if (i + 1 < len && text[i + 1] === '"') { field += '"'; i += 2; }
                else { i++; break; }
              } else { field += text[i]; i++; }
            }
          } else {
            while (i < len && text[i] !== ',' && text[i] !== '\n') { field += text[i]; i++; }
          }
          fields.push(field);
          if (i >= len || text[i] === '\n') { i++; break; }
          i++; // skip comma
        }
        rows.push(fields);
      }

      const headers = rows[0].map(h => h.trim());
      return rows.slice(1).filter(r => r.length > 1 || r[0].trim()).map(vals =>
        Object.fromEntries(headers.map((h, j) => [h, (vals[j] || '').replace(/\n/g, ' ').trim()]))
      );
    }

    // ── Fisher-Yates ────────────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ── localStorage ────────────────────────────────────────────────────────
    const KEYS = { emmanuel: 'progress_emmanuel', hadja: 'progress_hadja' };
    const loadProgress = (u) => { try { return JSON.parse(localStorage.getItem(KEYS[u]) || '{}'); } catch { return {}; } };
    const saveProgress = (u, p) => localStorage.setItem(KEYS[u], JSON.stringify(p));

    // ── User config ─────────────────────────────────────────────────────────
    const CFG = {
      emmanuel: {
        label: 'Emmanuel', emoji: '👨',
        border: 'border-blue-500', barColor: 'bg-blue-500',
        btn: 'bg-blue-600 hover:bg-blue-700', badge: 'bg-blue-100 text-blue-700',
        wordColor: 'text-blue-700', tab: 'border-blue-600 text-blue-600',
        homeBg: 'from-blue-500 to-blue-700',
      },
      hadja: {
        label: 'Hadja', emoji: '👩',
        border: 'border-purple-500', barColor: 'bg-purple-500',
        btn: 'bg-purple-600 hover:bg-purple-700', badge: 'bg-purple-100 text-purple-700',
        wordColor: 'text-purple-700', tab: 'border-purple-600 text-purple-600',
        homeBg: 'from-purple-500 to-purple-700',
      },
    };

    // ════════════════════════════════════════════════════════════════════════
    // SCRAMBLE LEVEL
    // ════════════════════════════════════════════════════════════════════════
    function ScrambleLevel({ wordId, level, sentence, wordsStr, onSuccess }) {
      const initPool = useMemo(
        () => shuffle(sentence.split(/\s+/).filter(Boolean)),
        [wordId, level, sentence]
      );
      const correctAnswer = useMemo(
        () => sentence.split(/\s+/).filter(Boolean).join(' '),
        [sentence]
      );
      const [pool, setPool]     = useState(initPool);
      const [answer, setAnswer] = useState([]);
      const [status, setStatus] = useState('idle'); // idle | correct | wrong | revealed
      const [errors, setErrors] = useState(0);

      const pick = (i) => {
        if (status === 'correct') return;
        setAnswer(a => [...a, pool[i]]);
        setPool(p => p.filter((_, j) => j !== i));
        setStatus('idle');
      };

      const unpick = (i) => {
        if (status === 'correct') return;
        setPool(p => [...p, answer[i]]);
        setAnswer(a => a.filter((_, j) => j !== i));
        setStatus('idle');
      };

      const validate = () => {
        if (answer.join(' ') === correctAnswer) {
          setStatus('correct');
          setTimeout(onSuccess, 700);
        } else {
          const next = errors + 1;
          setErrors(next);
          if (next >= 3) {
            setStatus('revealed');
          } else {
            setStatus('wrong');
          }
        }
      };

      const reset = () => { setPool(initPool); setAnswer([]); setStatus('idle'); };

      const borderColor = status === 'correct'  ? 'border-green-400 bg-green-50'
                        : status === 'wrong'    ? 'border-red-400 bg-red-50'
                        : status === 'revealed' ? 'border-amber-400 bg-amber-50'
                        : 'border-gray-200 bg-gray-50';

      return (
        <div className="space-y-3">
          {/* Answer zone */}
          <div className={`min-h-10 p-3 rounded-xl border-2 flex flex-wrap gap-2 transition-colors ${borderColor}`}>
            {answer.length === 0 && (
              <span className="text-gray-400 text-sm italic self-center">Clique les mots ici…</span>
            )}
            {answer.map((w, i) => (
              <button key={i} onClick={() => unpick(i)}
                className="px-3 py-1 rounded-full bg-white border border-gray-300 text-sm font-medium shadow-sm hover:bg-red-50 hover:border-red-300 transition-colors">
                {w}
              </button>
            ))}
          </div>

          {/* Pool */}
          <div className="flex flex-wrap gap-2 min-h-8">
            {pool.map((w, i) => (
              <button key={i} onClick={() => pick(i)}
                className="px-3 py-1 rounded-full bg-white border border-gray-300 text-sm font-medium shadow-sm hover:bg-indigo-50 hover:border-indigo-300 transition-colors">
                {w}
              </button>
            ))}
          </div>

          {/* Feedback */}
          {status === 'correct'  && <p className="text-green-600 font-semibold text-center text-sm">✅ Parfait !</p>}
          {status === 'wrong'    && <p className="text-red-500 font-semibold text-center text-sm">❌ Pas tout à fait, réessaie ! ({3 - errors} essai{3 - errors > 1 ? 's' : ''} restant{3 - errors > 1 ? 's' : ''})</p>}
          {status === 'revealed' && (
            <div className="space-y-2">
              <p className="text-amber-600 font-semibold text-center text-sm">💡 Voici la bonne réponse :</p>
              <p className="text-center text-gray-800 font-medium bg-amber-100 rounded-xl p-3 text-sm leading-relaxed">{correctAnswer}</p>
              <button onClick={() => { setStatus('correct'); setTimeout(onSuccess, 300); }}
                className="w-full py-2 rounded-xl bg-amber-500 text-white font-semibold text-sm hover:bg-amber-600 transition-colors">
                Compris, continuer →
              </button>
            </div>
          )}

          {/* Actions */}
          <div className="flex gap-2">
            <button onClick={validate} disabled={answer.length === 0 || status === 'correct' || status === 'revealed'}
              className="flex-1 py-2 rounded-xl bg-indigo-600 text-white font-semibold text-sm hover:bg-indigo-700 disabled:opacity-40 transition-colors">
              Valider
            </button>
            {(status === 'wrong' || answer.length > 0) && status !== 'correct' && status !== 'revealed' && (
              <button onClick={reset}
                className="px-4 py-2 rounded-xl bg-gray-100 text-gray-700 font-semibold text-sm hover:bg-gray-200 transition-colors">
                Réinitialiser
              </button>
            )}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // FLIP CARD
    // ════════════════════════════════════════════════════════════════════════
    function FlipCard({ word, user, onSkip, onLearned }) {
      const [flipped, setFlipped]       = useState(false);
      const [mode, setMode]             = useState(null); // 'learn' | 'known'
      const [scrambleStep, setScrambleStep] = useState(0);
      const cfg = CFG[user];

      const examples = [
        { en: word.example_1_en, fr: word.example_1_fr },
        { en: word.example_2_en, fr: word.example_2_fr },
        { en: word.example_3_en, fr: word.example_3_fr },
      ];

      const scrambles = [
        { key: 'easy',   label: '🟢 Facile',    sentence: word.scramble_easy_sentence,   words: word.scramble_easy_words },
        { key: 'medium', label: '🟡 Moyen',     sentence: word.scramble_medium_sentence, words: word.scramble_medium_words },
        { key: 'hard',   label: '🔴 Difficile', sentence: word.scramble_hard_sentence,   words: word.scramble_hard_words },
      ];

      const handleScrambleSuccess = () => {
        const next = scrambleStep + 1;
        setScrambleStep(next);
        if (next >= 3) setTimeout(onLearned, 500);
      };

      return (
        <div className="card-container w-full">
          <div className={`card-inner ${flipped ? 'flipped' : ''}`}>

            {/* ── RECTO ── */}
            <div className="card-face w-full">
              <div className={`rounded-3xl shadow-xl p-8 bg-white border-t-8 ${cfg.border} flex flex-col items-center gap-6 min-h-72`}>
                <span className={`text-xs font-bold uppercase tracking-widest px-3 py-1 rounded-full ${cfg.badge}`}>
                  {word.type}
                </span>
                <h2 className="text-5xl font-extrabold text-gray-800 text-center tracking-tight">{word.word}</h2>
                <div className="flex gap-3 w-full mt-2">
                  <button onClick={() => { setMode('known'); setFlipped(true); }}
                    className="flex-1 py-3 rounded-2xl bg-gray-100 text-gray-600 font-semibold hover:bg-gray-200 active:scale-95 transition-all text-base">
                    ✅ Je connais
                  </button>
                  <button onClick={() => { setMode('learn'); setFlipped(true); }}
                    className={`flex-1 py-3 rounded-2xl text-white font-semibold active:scale-95 transition-all text-base ${cfg.btn}`}>
                    📖 J'apprends
                  </button>
                </div>
              </div>
            </div>

            {/* ── VERSO ── */}
            <div className="card-back card-face w-full">
              <div className={`rounded-3xl shadow-xl bg-white border-t-8 ${cfg.border} overflow-hidden`}>
                {/* Header traduction */}
                <div className="px-6 pt-6 pb-4 text-center border-b border-gray-100">
                  <p className="text-sm text-gray-400 font-medium uppercase tracking-wider">{word.word} · {word.type}</p>
                  <p className={`text-3xl font-extrabold mt-1 ${cfg.wordColor}`}>{word.translation_fr}</p>
                </div>

                {/* Exemples */}
                <div className="px-6 py-4 space-y-3 border-b border-gray-100">
                  <p className="text-xs font-bold uppercase tracking-widest text-gray-400">Exemples</p>
                  {examples.filter(e => e.en).map((ex, i) => (
                    <div key={i} className="bg-slate-50 rounded-2xl p-3 space-y-0.5">
                      <p className="text-gray-800 font-medium text-sm leading-snug">{ex.en}</p>
                      <p className="text-gray-500 text-sm italic leading-snug">{ex.fr}</p>
                    </div>
                  ))}
                </div>

                {/* Scrambles (only in learn mode) */}
                {mode === 'learn' && (
                <div className="px-6 py-4 space-y-4">
                  <p className="text-xs font-bold uppercase tracking-widest text-gray-400">Remets dans l'ordre</p>
                  {scrambles.map((sc, i) => (
                    <div key={sc.key} className={`rounded-2xl border p-4 space-y-3 transition-opacity ${
                      i < scrambleStep  ? 'opacity-40'
                      : i === scrambleStep ? 'opacity-100'
                      : 'opacity-20 pointer-events-none'
                    }`}>
                      <p className="text-sm font-semibold text-gray-600">{sc.label}</p>
                      {i === scrambleStep && sc.words ? (
                        <ScrambleLevel
                          key={`${word.id}-${sc.key}`}
                          wordId={word.id}
                          level={sc.key}
                          sentence={sc.sentence}
                          wordsStr={sc.words}
                          onSuccess={handleScrambleSuccess}
                        />
                      ) : i < scrambleStep ? (
                        <p className="text-green-600 text-sm font-medium">✅ {sc.sentence}</p>
                      ) : null}
                    </div>
                  ))}
                </div>                )}

                {/* Next button (known mode) */}
                {mode === 'known' && (
                  <div className="px-6 py-4">
                    <button onClick={onLearned}
                      className="w-full py-3 rounded-2xl bg-gray-100 text-gray-600 font-semibold hover:bg-gray-200 active:scale-95 transition-all text-base">
                      Mot suivant →
                    </button>
                  </div>
                )}              </div>
            </div>

          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // HOME SCREEN
    // ════════════════════════════════════════════════════════════════════════
    function HomeScreen({ onSelect }) {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center gap-10 px-6 bg-gradient-to-br from-slate-100 to-slate-200">
          <div className="text-center space-y-3">
            <div className="text-6xl">📚</div>
            <h1 className="text-4xl font-extrabold text-gray-800 tracking-tight">TOEIC Vocab</h1>
            <p className="text-gray-500 text-lg">Qui apprend aujourd'hui ?</p>
          </div>
          <div className="flex flex-col sm:flex-row gap-4 w-full max-w-xs">
            {['emmanuel', 'hadja'].map(u => (
              <button key={u} onClick={() => onSelect(u)}
                className={`flex-1 py-6 rounded-3xl text-white text-xl font-bold shadow-xl active:scale-95 transition-all bg-gradient-to-br ${CFG[u].homeBg}`}>
                {CFG[u].emoji} {CFG[u].label}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // LEARN SCREEN
    // ════════════════════════════════════════════════════════════════════════
    function LearnScreen({ words, user, progress, onWordLearned, onGoLearned, onLogout }) {
      const cfg = CFG[user];
      const userProgress = progress[user] || {};
      const learnedCount = Object.keys(userProgress).length;

      const queue = useMemo(
        () => words.filter(w => !userProgress[w.id]),
        [words, progress, user]
      );

      const [idx, setIdx] = useState(0);
      const current = queue[idx] || queue[0];

      if (!current) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center gap-6 px-6 text-center">
            <div className="text-6xl">🎉</div>
            <h2 className="text-2xl font-bold text-gray-800">Tous les mots sont appris !</h2>
            <p className="text-gray-500">Reviens quand de nouveaux mots sont ajoutés.</p>
            <button onClick={onGoLearned} className={`px-6 py-3 rounded-2xl text-white font-semibold ${cfg.btn}`}>
              Voir mes mots appris
            </button>
            <button onClick={onLogout} className="text-gray-400 hover:text-gray-600 text-sm underline">
              Changer d'utilisateur
            </button>
          </div>
        );
      }

      const handleSkip = () => setIdx(i => (i + 1) % queue.length);
      const handleLearned = () => {
        onWordLearned(user, current.id);
        setIdx(i => (i >= queue.length - 2 ? 0 : i));
      };

      const pct = Math.round((learnedCount / Math.max(words.length, 1)) * 100);

      return (
        <div className="min-h-screen flex flex-col bg-slate-50">
          {/* Header */}
          <div className="flex items-center justify-between px-5 py-4 bg-white shadow-sm sticky top-0 z-10">
            <button onClick={onLogout} className="text-gray-400 hover:text-gray-600 text-sm font-medium">← Quitter</button>
            <span className={`text-sm font-bold px-3 py-1 rounded-full ${cfg.badge}`}>
              {cfg.emoji} {cfg.label}
            </span>
            <button onClick={onGoLearned} className="text-sm text-indigo-600 hover:text-indigo-800 font-semibold">
              Mes mots →
            </button>
          </div>

          {/* Progress */}
          <div className="px-5 pt-4 pb-2">
            <div className="flex justify-between text-xs text-gray-500 mb-1.5">
              <span>🎓 {learnedCount} mot{learnedCount > 1 ? 's' : ''} appris</span>
              <span>{pct}% · {queue.length} restant{queue.length > 1 ? 's' : ''}</span>
            </div>
            <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
              <div className={`h-full rounded-full transition-all duration-500 ${cfg.barColor}`}
                style={{ width: `${pct}%` }} />
            </div>
          </div>

          {/* Card */}
          <div className="flex-1 px-4 pb-8 pt-3 overflow-y-auto">
            <div className="slide-in" key={current.id}>
              <FlipCard
                word={current}
                user={user}
                onSkip={handleSkip}
                onLearned={handleLearned}
              />
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // LEARNED SCREEN
    // ════════════════════════════════════════════════════════════════════════
    function LearnedScreen({ words, progress, onBack }) {
      const [tab, setTab] = useState('emmanuel');
      const wordMap = Object.fromEntries(words.map(w => [w.id, w]));
      const entries = Object.entries(progress[tab] || {})
        .sort((a, b) => new Date(b[1].date) - new Date(a[1].date));

      return (
        <div className="min-h-screen flex flex-col bg-slate-50">
          {/* Header */}
          <div className="flex items-center gap-3 px-5 py-4 bg-white shadow-sm sticky top-0 z-10">
            <button onClick={onBack} className="text-gray-400 hover:text-gray-600 text-xl">←</button>
            <h1 className="text-lg font-bold text-gray-800">Mots appris</h1>
          </div>

          {/* Tabs */}
          <div className="flex bg-white border-b border-gray-100 px-5">
            {['emmanuel', 'hadja'].map(u => {
              const count = Object.keys(progress[u] || {}).length;
              return (
                <button key={u} onClick={() => setTab(u)}
                  className={`flex-1 py-3 text-sm font-semibold border-b-2 transition-colors ${
                    tab === u ? CFG[u].tab : 'border-transparent text-gray-400 hover:text-gray-600'
                  }`}>
                  {CFG[u].emoji} {CFG[u].label}
                  <span className="ml-2 text-xs bg-gray-100 rounded-full px-2 py-0.5">{count}</span>
                </button>
              );
            })}
          </div>

          {/* Cards */}
          <div className="flex-1 overflow-y-auto px-5 py-4 space-y-3">
            {entries.length === 0 ? (
              <div className="text-center mt-16 space-y-2">
                <p className="text-4xl">📭</p>
                <p className="text-gray-400">Aucun mot appris pour l'instant.</p>
              </div>
            ) : entries.map(([id, { date }]) => {
              const w = wordMap[id];
              if (!w) return null;
              const examples = [
                { en: w.example_1_en, fr: w.example_1_fr },
                { en: w.example_2_en, fr: w.example_2_fr },
                { en: w.example_3_en, fr: w.example_3_fr },
              ].filter(e => e.en);
              return (
                <details key={id} className="bg-white rounded-2xl shadow-sm overflow-hidden group">
                  <summary className="p-4 flex justify-between items-center cursor-pointer hover:bg-slate-50 transition-colors">
                    <div>
                      <p className="font-bold text-gray-800">{w.word}</p>
                      <p className="text-sm text-gray-500">
                        {w.translation_fr} · <span className="italic">{w.type}</span>
                      </p>
                    </div>
                    <p className="text-xs text-gray-400 text-right shrink-0 ml-3">
                      {new Date(date).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: '2-digit' })}
                    </p>
                  </summary>
                  <div className="px-4 pb-4 space-y-2 border-t border-gray-100 pt-3">
                    {examples.map((ex, i) => (
                      <div key={i} className="bg-slate-50 rounded-xl p-3 space-y-0.5">
                        <p className="text-gray-800 font-medium text-sm leading-snug">{ex.en}</p>
                        <p className="text-gray-500 text-sm italic leading-snug">{ex.fr}</p>
                      </div>
                    ))}
                  </div>
                </details>
              );
            })}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════════════
    // APP ROOT
    // ════════════════════════════════════════════════════════════════════════
    function App() {
      const [screen,   setScreen]   = useState('home');
      const [user,     setUser]     = useState(null);
      const [words,    setWords]    = useState([]);
      const [loading,  setLoading]  = useState(true);
      const [error,    setError]    = useState(null);
      const [progress, setProgress] = useState({
        emmanuel: loadProgress('emmanuel'),
        hadja:    loadProgress('hadja'),
      });

      useEffect(() => {
        fetch('data/toeic_enriched.csv')
          .then(r => { if (!r.ok) throw new Error('CSV introuvable — vérifiez le fichier data/toeic_enriched.csv'); return r.text(); })
          .then(text => { setWords(parseCSV(text)); setLoading(false); })
          .catch(e => { setError(e.message); setLoading(false); });
      }, []);

      const handleSelect = (u) => { setUser(u); setScreen('learn'); };
      const handleLogout = () => { setUser(null); setScreen('home'); };

      const handleWordLearned = (u, id) => {
        setProgress(prev => {
          const updated = { ...prev, [u]: { ...prev[u], [id]: { date: new Date().toISOString() } } };
          saveProgress(u, updated[u]);
          return updated;
        });
      };

      if (loading) return (
        <div className="min-h-screen flex flex-col items-center justify-center gap-4">
          <div className="text-5xl animate-bounce">📚</div>
          <p className="text-gray-400 text-lg">Chargement du vocabulaire…</p>
        </div>
      );

      if (error) return (
        <div className="min-h-screen flex items-center justify-center px-6">
          <div className="text-center space-y-4 max-w-sm">
            <p className="text-5xl">⚠️</p>
            <p className="text-red-500 font-semibold">{error}</p>
            <p className="text-gray-400 text-sm">
              Assure-toi que <code className="bg-gray-100 px-1 rounded">data/toeic_enriched.csv</code> est accessible
              et que tu accèdes à l'app via un serveur (pas en ouvrant le fichier directement).
            </p>
          </div>
        </div>
      );

      if (screen === 'home')    return <HomeScreen onSelect={handleSelect} />;
      if (screen === 'learned') return <LearnedScreen words={words} progress={progress} onBack={() => setScreen('learn')} />;
      return (
        <LearnScreen
          words={words}
          user={user}
          progress={progress}
          onWordLearned={handleWordLearned}
          onGoLearned={() => setScreen('learned')}
          onLogout={handleLogout}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
